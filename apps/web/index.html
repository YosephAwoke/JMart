<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('jmart-theme');
          var theme = stored === 'dark' || stored === 'light' ? stored : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (error) {}
      })();
    </script>
    <title>JMart</title>
    <style>
      #boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), transparent 24%),
          radial-gradient(circle at 80% 10%, rgba(99, 102, 241, 0.14), transparent 18%),
          rgb(248, 250, 252);
        color: rgb(15, 23, 42);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      html.dark #boot-screen {
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.18), transparent 24%),
          radial-gradient(circle at 80% 10%, rgba(99, 102, 241, 0.18), transparent 18%),
          rgb(9, 12, 20);
        color: rgb(248, 250, 252);
      }

      .boot-card {
        width: min(92vw, 420px);
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        padding: 28px;
        text-align: center;
      }

      html.dark .boot-card {
        background: rgba(15, 23, 42, 0.72);
      }

      .boot-spinner {
        margin: 0 auto 18px;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 3px solid rgba(16, 185, 129, 0.2);
        border-top-color: rgb(16, 185, 129);
        animation: boot-spin 0.9s linear infinite;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="h-full bg-background font-body text-foreground antialiased">
    <div id="root" class="min-h-full">
      <div id="boot-screen">
        <div class="boot-card">
          <div class="boot-spinner"></div>
          <p style="font-size: 0.72rem; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase; color: rgb(16, 185, 129);">JMart</p>
          <h1 style="margin-top: 10px; font-size: 1.6rem; line-height: 1.1; font-weight: 800;">Loading your store...</h1>
          <p style="margin-top: 12px; font-size: 0.95rem; line-height: 1.6; color: rgb(100, 116, 139);">Bringing in products, checkout, and a premium shopping layout.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
